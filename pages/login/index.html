<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <main>
        <section>
            <div class="flex">
                <div class="w-full relative md:block hidden">
                    <img src="/assets/bg-login.png" class="w-full h-screen object-cover" alt="">
                    <div class="absolute z-2 bottom-1/3 left-8 px-30">
                        <div class="text-[#CD7A27] text-[12px] font-semibold px-4 py-2 bg-[#CD7A27]/20 rounded-full w-fit">
                        <p>Secure Access Gateway</p>
                    </div>
                    <h3 class="text-white font-bold text-[72px]">THE FUTURE
                        OF <span class="text-[#CD7A27]">ASSETS.</span></h3>
                    <p class="text-gray-500 text-[16px] max-w-sm">Enterprise-grade security meets cinematic
                        performance. Access your digital inventory within the
                        most secure architecture ever built.</p>
                    </div>
                </div>
                <div class="w-full min-h-screen bg-[#1C1B1C] md:px-20 md:py-20 px-8 py-8" >
                    <h1 class="text-white text-[28px] font-bold ">NEXTERA</h1>
                        <form action="/pages/home/index.html" method="POST" class=" w-full h-full flex-1 flex flex-col justify-center">
                    <div class="py-8">
                        <h4 class="text-[32px] text-white font-semibold">Welcome back.</h4>
                        <p class="text-gray-500 text-[16px]">Enter your credentials to access the NextEra.</p>
                    </div>
                    <div class="mb-5 w-full">
                        <label for="email" class="block text-gray-500 text-[12px] font-medium mb-2">EMAIL ADDRESS</label>
                        <div class="flex gap-2 bg-[#0E0E0F] items-center justify-center px-4 focus:ring-1 py-3 focus:ring-gray-500 focus:outline-none rounded-md">
                            <img src="/assets/ic-email.svg" class="w-[18px] h-[18px]" alt="">
                            <input type="email" id="email" placeholder="example@gmail.com" name="email" class="w-full text-gray-500 placeholder:text-gray-500 outline-none ">
                        </div>
                    </div>
                    <div class="mb-5 w-full">
                        <label for="password" class="block text-gray-500 text-[12px] font-medium mb-2">PASSWORD</label>
                        <div class="flex gap-2 bg-[#0E0E0F] items-center justify-center px-4 focus:ring-1 py-3 focus:ring-gray-500 focus:outline-none rounded-md">
                            <img src="/assets/ic-password.svg" class="w-[18px] h-[18px]" alt="">
                            <input type="password" id="password" placeholder="Enter your password" name="password" class="w-full text-gray-500 placeholder:text-gray-500 outline-none ">
                        </div>
                    </div>
                    
                    <button
                    type="submit" class="cursor-pointer bg-[#CD7A27] hover:bg-[#A05913] font-semibold w-full text-white px-[24px] py-[10px] rounded-md text-[16px] mt-3">
                        LOGIN ACCESS
                    </button>
                    
                    <div class="text-center w-full mt-10">
                    <p class="text-gray-500 text-[14px]">Don't Have an Account? <span class="text-white font-semibold"> <a href="/pages/signup/index.html">Sign Up</a></span></p>
                </div>
                </form>   
                </div>
                </div>
            </div>
        </section>
    </main>
</body>
<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e){
    e.preventDefault();
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const validEmail = "admin@nextera.com";
    const validPassword = "123456";
    if(email === validEmail && password === validPassword){
        window.location.href = "/pages/home/index.html";
    } else {
        alert("Email atau password salah!");
    }
});
</script>
</html>
